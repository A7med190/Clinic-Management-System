[tool.black]
line-length = 119
target-version = ["py311"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 119
multi_line_output = 3
include_trailing_comma = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.local"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["apps", "core"]

[tool.coverage.run]
source = ["apps", "core", "config"]
omit = ["*/tests/*", "*/migrations/*", "*/settings/*", "manage.py"]

[tool.coverage.report]
show_missing = true
fail_under = 80
